
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        python -c "from src.utils.config import Config; print('Config OK')"
        python -c "from src.utils.models import SensorReading; print('Models OK')"
        python -c "from src.feature_engineering.extractor import FeatureEngineer; print('Feature Engineer OK')"
        python -c "from src.model_training.architectures import LSTMPredictor; print('Models OK')"
