version: '3.8'

services:
  api:
    build: .
    container_name: predictive-maintenance-api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    volumes:
      - ./models/trained_models:/app/models/trained_models
    restart: unless-stopped

  postgres:
    image: postgres:13
    container_name: predictive-maintenance-db
    environment:
      POSTGRES_DB: predictive_maintenance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    container_name: predictive-maintenance-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
